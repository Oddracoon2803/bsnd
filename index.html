<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BISINDO Recognition</title>

    <!-- MediaPipe -->
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            background: #e9e9e9;
        }

        .app {
            display: flex;
            padding: 30px;
            gap: 40px;
        }

        .camera-box {
            width: 720px;
            height: 520px;
            background: black;
            border-radius: 10px;
            overflow: hidden;
            position: relative;
        }

        video,
        canvas {
            position: absolute;
            width: 100%;
            height: 100%;
            transform: scaleX(-1);
        }

        .panel {
            flex: 1;
            text-align: center;
        }

        .prediction {
            font-size: 28px;
        }

        .prediction span {
            display: block;
            font-size: 60px;
            font-weight: bold;
        }

        .btn {
            width: 140px;
            padding: 10px;
            margin: 10px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .app {
                flex-direction: column;
            }

            .camera-box {
                width: 100%;
                height: auto;
                aspect-ratio: 16/9;
            }
        }
    </style>
</head>

<body>

<div class="app">

    <div class="camera-box">
        <video class="input_video"></video>
        <canvas class="output_canvas"></canvas>
    </div>

    <div class="panel">
        <div class="prediction">
            Abjad:
            <span id="prediction">-</span>
        </div>

        <button class="btn" id="startBtn">Start</button>
        <button class="btn" id="stopBtn">Stop</button>
        <button class="btn" id="exitBtn">Exit</button>
    </div>

</div>

<script>
    // 🔥 GANTI INI DENGAN URL NGROK
    const API_URL = "https://chatty-joyride-renounce.ngrok-free.dev/predict";

    const videoElement = document.querySelector(".input_video");
    const canvasElement = document.querySelector(".output_canvas");
    const canvasCtx = canvasElement.getContext("2d");
    const labelBox = document.getElementById("prediction");

    canvasElement.width = 720;
    canvasElement.height = 520;

    let camera = null;
    let running = false;

    let lastPredictTime = 0;
    const PREDICT_INTERVAL = 800;

    let isPredicting = false;
    let lastResults = [];

    // =========================
    // EXTRACT LANDMARK
    // =========================
    function extractLandmarks(results) {

        let left = new Array(63).fill(0);
        let right = new Array(63).fill(0);

        if (!results.multiHandLandmarks) {
            return [...left, ...right];
        }

        for (let i = 0; i < results.multiHandLandmarks.length; i++) {

            const hand = results.multiHandLandmarks[i];
            const label = results.multiHandedness[i].label;

            let coords = [];

            hand.forEach(lm => {
                coords.push(lm.x, lm.y, lm.z);
            });

            if (label === "Left") {
                left = coords;
            } else {
                right = coords;
            }
        }

        return [...left, ...right];
    }

    // =========================
    // API CALL
    // =========================
    async function predictLandmark(landmarks) {
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({landmarks})
            });

            if (!res.ok) throw new Error("Server error");

            return await res.json();

        } catch (err) {
            console.error("API error:", err);
            return {label: "-", conf: 0, error: true};
        }
    }

    // =========================
    // MEDIAPIPE SETUP
    // =========================
    const hands = new Hands({
        locateFile: file =>
            `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
    });

    hands.setOptions({
        maxNumHands: 2,
        modelComplexity: 0,
        minDetectionConfidence: 0.6,
        minTrackingConfidence: 0.6
    });

    hands.onResults(async (results) => {

        canvasCtx.save();
        canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
        canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

        if (!results.multiHandLandmarks || results.multiHandLandmarks.length === 0) {
            labelBox.innerText = "-";
            canvasCtx.restore();
            return;
        }

        for (const lm of results.multiHandLandmarks) {
            drawConnectors(canvasCtx, lm, HAND_CONNECTIONS);
            drawLandmarks(canvasCtx, lm);
        }

        const landmarks = extractLandmarks(results);
        const now = Date.now();

        if (!isPredicting && now - lastPredictTime > PREDICT_INTERVAL) {

            isPredicting = true;
            lastPredictTime = now;

            labelBox.innerText = "...";

            const result = await predictLandmark(landmarks);

            if (!result.error) {

                // smoothing (majority vote)
                lastResults.push(result.label);

                if (lastResults.length > 5) {
                    lastResults.shift();
                }

                const mostFrequent = lastResults
                    .sort((a, b) =>
                        lastResults.filter(v => v === a).length -
                        lastResults.filter(v => v === b).length
                    )
                    .pop();

                labelBox.innerText =
                    `${mostFrequent} (${(result.conf * 100).toFixed(1)}%)`;

            } else {
                labelBox.innerText = "ERR";
            }

            isPredicting = false;
        }

        canvasCtx.restore();
    });

    // =========================
    // BUTTONS
    // =========================
    document.getElementById("startBtn").onclick = () => {

        if (running) return;

        camera = new Camera(videoElement, {
            onFrame: async () => {
                await hands.send({image: videoElement});
            },
            width: 720,
            height: 520,
            facingMode: "environment"
        });

        camera.start();
        running = true;
    };

    document.getElementById("stopBtn").onclick = () => {
        if (camera) {
            camera.stop();
            running = false;
            labelBox.innerText = "-";
        }
    };

    document.getElementById("exitBtn").onclick = () => {
        alert("Tutup tab untuk keluar");
    };

</script>

</body>
</html>
