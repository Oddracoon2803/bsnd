<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BISINDO Recognition Demo</title>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f4f4f9;
            color: #333;
            display: flex;
            justify-content: center;
        }

        .app {
            display: flex;
            flex-direction: row;
            padding: 20px;
            gap: 20px;
            max-width: 1200px;
            width: 100%;
        }

        .camera-box {
            flex: 2;
            background: #000;
            border-radius: 15px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            aspect-ratio: 4 / 3;
        }

        video, canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            transform: scaleX(-1); /* Mirror view */
            object-fit: cover;
        }

        .panel {
            flex: 1;
            background: white;
            padding: 30px;
            border-radius: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }

        .prediction-label {
            font-size: 1.2rem;
            color: #666;
            margin-bottom: 5px;
        }

        #prediction {
            font-size: 5rem;
            font-weight: 800;
            color: #2c3e50;
            margin-bottom: 20px;
            min-height: 120px;
            display: flex;
            align-items: center;
        }

        .controls {
            width: 100%;
            display: grid;
            gap: 10px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 1rem;
        }

        #startBtn { background: #27ae60; color: white; }
        #startBtn:hover { background: #2ecc71; }
        
        #stopBtn { background: #e67e22; color: white; }
        #stopBtn:hover { background: #f39c12; }

        #exitBtn { background: #c0392b; color: white; }

        @media (max-width: 850px) {
            .app { flex-direction: column; }
            .camera-box { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="app">
        <div class="camera-box">
            <video class="input_video" playsinline></video>
            <canvas class="output_canvas"></canvas>
        </div>

        <div class="panel">
            <div class="prediction-label">Hasil Deteksi:</div>
            <div id="prediction">-</div>

            <div class="controls">
                <button class="btn" id="startBtn">Mulai Kamera</button>
                <button class="btn" id="stopBtn">Berhenti</button>
                <button class="btn" id="exitBtn">Keluar</button>
            </div>
            <p style="font-size: 12px; color: #999; margin-top: 20px;">
                Status: <span id="status">Ready</span>
            </p>
        </div>
    </div>

    <script>
        // 1. GANTI URL INI DENGAN URL NGROK AKTIF ANDA (WAJIB HTTPS)
        const API_URL = "https://chatty-joyride-renounce.ngrok-free.dev/predict";

        const videoElement = document.querySelector(".input_video");
        const canvasElement = document.querySelector(".output_canvas");
        const canvasCtx = canvasElement.getContext("2d");
        const labelBox = document.getElementById("prediction");
        const statusText = document.getElementById("status");

        let camera = null;
        let running = false;
        let lastPredictTime = 0;
        const PREDICT_INTERVAL = 400; // ms

        function extractLandmarks(results) {
            let left = new Array(63).fill(0);
            let right = new Array(63).fill(0);

            if (!results.multiHandLandmarks) return [...left, ...right];

            results.multiHandLandmarks.forEach((hand, idx) => {
                const label = results.multiHandedness[idx].label;
                const coords = [];
                hand.forEach(lm => coords.push(lm.x, lm.y, lm.z));

                if (label === "Left") left = coords;
                else right = coords;
            });

            return [...left, ...right];
        }

        async function predictLandmark(landmarks) {
            try {
                const res = await fetch(API_URL, {
                    method: "POST",
                    headers: { 
                        "Content-Type": "application/json",
                        // Header krusial untuk bypass peringatan Ngrok
                        "ngrok-skip-browser-warning": "true" 
                    },
                    body: JSON.stringify({ landmarks: landmarks })
                });

                if (!res.ok) throw new Error("Server Error");
                const data = await res.json();
                return data;
            } catch (err) {
                console.error("API Error:", err);
                statusText.innerText = "Error Koneksi!";
                return { label: "Error", conf: 0 };
            }
        }

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 2,
            modelComplexity: 1,
            minDetectionConfidence: 0.5,
            minTrackingConfidence: 0.5
        });

        hands.onResults(async (results) => {
            // Sinkronisasi ukuran canvas dengan resolusi video
            canvasElement.width = videoElement.videoWidth;
            canvasElement.height = videoElement.videoHeight;

            canvasCtx.save();
            canvasCtx.clearRect(0, 0, canvasElement.width, canvasElement.height);
            canvasCtx.drawImage(results.image, 0, 0, canvasElement.width, canvasElement.height);

            if (results.multiHandLandmarks) {
                for (const landmarks of results.multiHandLandmarks) {
                    drawConnectors(canvasCtx, landmarks, HAND_CONNECTIONS, {color: '#00FF00', lineWidth: 5});
                    drawLandmarks(canvasCtx, landmarks, {color: '#FF0000', lineWidth: 2});
                }

                // Pengiriman data ke API dengan interval
                const now = Date.now();
                if (now - lastPredictTime > PREDICT_INTERVAL) {
                    lastPredictTime = now;
                    statusText.innerText = "Menganalisa...";
                    
                    const landmarkData = extractLandmarks(results);
                    const response = await predictLandmark(landmarkData);
                    
                    labelBox.innerText = response.label;
                    statusText.innerText = `Online (Conf: ${(response.conf * 100).toFixed(1)}%)`;
                }
            } else {
                labelBox.innerText = "-";
                statusText.innerText = "Tangan tidak terdeteksi";
            }
            canvasCtx.restore();
        });

        document.getElementById("startBtn").onclick = () => {
            if (running) return;
            statusText.innerText = "Memulai kamera...";
            camera = new Camera(videoElement, {
                onFrame: async () => {
                    await hands.send({image: videoElement});
                },
                width: 640,
                height: 480
            });
            camera.start();
            running = true;
            document.getElementById("startBtn").disabled = true;
        };

        document.getElementById("stopBtn").onclick = () => {
            if (camera) {
                camera.stop();
                running = false;
                location.reload(); // Refresh paling bersih untuk reset kamera
            }
        };

        document.getElementById("exitBtn").onclick = () => {
            if(confirm("Keluar dari aplikasi?")) window.close();
        };
    </script>
</body>
</html>
